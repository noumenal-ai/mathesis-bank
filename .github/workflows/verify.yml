# Mathesis — site build + STRICT re-derivation verification (public repo)
#
# PLACEMENT: this file lives at .github/workflows/verify.yml. Pushing under
# .github/workflows/ needs a token with `workflow` scope (known org gotcha —
# push via the web editor or the workflow-scoped account if your token lacks it).
#
# Post-F6 hardening. The "Verify" check no longer re-reads the manifest's own
# recorded verdict/axioms — it RE-DERIVES each result from its frozen export
# through the Lean kernel gate `mathesis-adjudicate`, and fails CLOSED
# (MATHESIS_STRICT=1) if the gate or a blob is missing. Flow per run:
#   1. build the gate from vendored source in backend-gate/  (Lean-core only,
#      NO Mathlib — ~2-3 min, GitHub-cached; from-clean build verified locally)
#   2. fetch the frozen .export blobs by sha256 from object storage
#      (ci/fetch_exports.sh — they exceed GitHub's 100 MB/file limit, so they
#      are NOT in git; the fetch sha256-verifies every blob)
#   3. regenerate the site + run ci/verify.sh under MATHESIS_STRICT=1
#      (independent kernel re-derivation of all Results; exits nonzero on fail)
#   4. INV-2 lint, refresh docs/, deploy Pages.
#
# GATE SOURCE (backend-gate/): the ~8 Lean files of the re-derivation gate,
# vendored from the private backend so the public CI can build the verifier
# from auditable source (see deploy/DEPLOY_P0.md for the vendoring step and the
# prebuilt-binary alternative).
name: verify

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * 1'   # weekly re-verify

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema

      # ── Re-derivation gate (finding F6 fix) ──────────────────────────────
      # Build mathesis-adjudicate from the vendored gate source. Lean-core only
      # (no Mathlib require anywhere in the closure — verified), so this is a
      # small, ~2 min build, NOT a Mathlib compile.
      #
      # use-github-cache is DISABLED deliberately: a cached .lake from an earlier
      # commit restored a STALE exe (lake saw it up-to-date and skipped the
      # rebuild), so a source change to the gate silently ran the OLD binary and
      # every definition mismatched. A clean build each run is cheap and correct.
      - name: Build re-derivation gate (mathesis-adjudicate)
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: backend-gate
          use-github-cache: false
          test: false
          lint: false

      # lean-action runs a bare `lake build` (default targets only). The exe is a
      # default_target in backend-gate/lakefile.lean, but build this explicitly too so
      # the binary is guaranteed present regardless of lean-action's build semantics.
      - name: Build the gate executable
        working-directory: backend-gate
        run: lake build mathesis-adjudicate

      - name: Locate the gate binary
        run: |
          BIN="$GITHUB_WORKSPACE/backend-gate/.lake/build/bin/mathesis-adjudicate"
          test -x "$BIN" || { echo "FATAL: gate exe not built at $BIN"; ls -R backend-gate/.lake/build/bin || true; exit 1; }
          echo "MATHESIS_ADJUDICATE=$BIN" >> "$GITHUB_ENV"

      # The gate exe calls Lean.findSysroot at startup (shells out to `lean` via
      # elan). lean-action pins the toolchain per-project, not globally, so the exe
      # — invoked by the Python verifier from the repo root — otherwise hits
      # "no default toolchain configured". Set a global default AND export
      # LEAN_SYSROOT (findSysroot honors it) so the exe resolves it either way.
      - name: Configure Lean toolchain for the gate exe
        working-directory: backend-gate
        run: |
          elan default "$(tr -d '[:space:]' < lean-toolchain)"
          echo "LEAN_SYSROOT=$(lean --print-prefix)" >> "$GITHUB_ENV"

      # ── Frozen export blobs (content-addressed, not in git) ──────────────
      - name: Fetch frozen exports (sha256-verified)
        env:
          MATHESIS_EXPORT_STORE: gh:${{ github.repository }}@exports-v1
          MATHESIS_EXPORTS_DIR: ${{ github.workspace }}/registry/_shared/exports
          GH_TOKEN: ${{ github.token }}
        run: bash ci/fetch_exports.sh

      - name: Regenerate the site
        run: python3 site/generate.py

      # ── THE gate: strict independent re-derivation ───────────────────────
      # verify.sh exits nonzero when _verify_check.py reports ok:false, which
      # under MATHESIS_STRICT includes "the gate/blobs were absent so nothing
      # was actually re-derived" — no silent green.
      - name: Verify (strict re-derivation against frozen exports)
        env:
          MATHESIS_STRICT: '1'
          MATHESIS_EXPORTS_DIR: ${{ github.workspace }}/registry/_shared/exports
          # Trusted logical-core reference: the gate rejects any candidate that
          # redefines a trusted constant (fake Iff/Eq/False). Bundled + auditable.
          MATHESIS_INIT_EXPORT: ${{ github.workspace }}/backend-gate/init.export
        run: |
          chmod +x ci/verify.sh
          ci/verify.sh docs/verification.json

      # INV-1 (house-vocabulary firewall) is enforced locally before publication
      # by site/generate.py (term list from a local, uncommitted file). CI does
      # not re-list the terms here.

      - name: INV-2 no-ranking lint (no 'featured'/'top'/star markup)
        run: |
          if grep -rInE '(class="(featured|top|ranked)"|★|⭐)' docs/ ; then
            echo "FATAL: INV-2 importance-signal markup found in docs/"; exit 1
          else
            echo "INV-2 lint: clean."
          fi

      - name: Commit refreshed docs/
        run: |
          git config user.name  "verify-bot"
          git config user.email "verify-bot@users.noreply.github.com"
          git add docs/
          git commit -m "ci: rebuild site + refresh verification.json [skip ci]" || echo "no change"
          git push || echo "nothing to push"

      - name: Upload verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: verification
          path: docs/verification.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build-and-verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
